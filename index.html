<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Store Finance Glass Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cash Register">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
    <div class="bg-shape shape-4"></div>

    <div id="app-container" class="glass-panel">
        <header>
            <h1 id="header-title">Cash Register</h1>
            <p id="current-date-display" class="date-subtext">Loading date...</p>
        </header>

        <main id="calc-view" class="view active">
            <div id="display-container" class="glass-card">
                <div id="display">0</div>
            </div>
            
            <div class="keypad">
                <button class="btn glass-btn" onclick="append('7')">7</button>
                <button class="btn glass-btn" onclick="append('8')">8</button>
                <button class="btn glass-btn" onclick="append('9')">9</button>
                <button class="btn glass-btn operator" onclick="append('/')">÷</button>
                
                <button class="btn glass-btn" onclick="append('4')">4</button>
                <button class="btn glass-btn" onclick="append('5')">5</button>
                <button class="btn glass-btn" onclick="append('6')">6</button>
                <button class="btn glass-btn operator" onclick="append('*')">×</button>
                
                <button class="btn glass-btn" onclick="append('1')">1</button>
                <button class="btn glass-btn" onclick="append('2')">2</button>
                <button class="btn glass-btn" onclick="append('3')">3</button>
                <button class="btn glass-btn operator" onclick="append('-')">-</button>
                
                <button class="btn glass-btn clear-btn" onclick="clearDisplay()">C</button>
                <button class="btn glass-btn" onclick="append('0')">0</button>
                <button class="btn glass-btn equals" onclick="calculate()">=</button>
                <button class="btn glass-btn operator" onclick="append('+')">+</button>
            </div>

            <div class="action-buttons">
                <button class="action-btn btn-rev" onclick="addTransaction('revenue')">
                    <span class="btn-text">Add Revenue</span>
                </button>
                <button class="action-btn btn-exp" onclick="addTransaction('expense')">
                    <span class="btn-text">Add Expense</span>
                </button>
            </div>
        </main>

        <main id="finance-view" class="view">
            
            <div class="controls-container glass-card">
                <label for="time-filter" class="filter-label">Analysis Period:</label>
                <div class="custom-select-wrapper">
                    <select id="time-filter" onchange="handleFilterChange()">
                        <option value="today">Today</option>
                        <option value="month">This Month</option>
                        <option value="last_month">Last Month</option>
                        <option value="year">This Year</option>
                        <option value="custom">Custom Range</option>
                        <option value="all">All Time</option>
                    </select>
                    <span class="select-arrow">▼</span>
                </div>
            </div>

            <div id="custom-date-container" class="custom-dates glass-card" style="display: none;">
                <div class="date-input-group">
                    <label>From:</label>
                    <input type="date" id="date-start" onchange="updateFinancials()">
                </div>
                <div class="date-input-group">
                    <label>To:</label>
                    <input type="date" id="date-end" onchange="updateFinancials()">
                </div>
            </div>

            <div class="summary-card glass-card">
                <h3 class="subtitle">Net Profit / Loss</h3>
                <div id="net-amount" class="profit-loss">₹0</div>
                <div class="stats-row">
                    <div class="stat-box">
                        <span class="stat-label">Total Revenue</span>
                        <span id="tot-rev" class="stat-val rev-text">₹0</span>
                    </div>
                    <div class="divider"></div>
                    <div class="stat-box">
                        <span class="stat-label">Total Expense</span>
                        <span id="tot-exp" class="stat-val exp-text">₹0</span>
                    </div>
                </div>
            </div>

            <div class="chart-container glass-card">
                <h3 class="section-title chart-title">Income Breakdown</h3>
                <div class="canvas-wrapper">
                    <canvas id="financeChart"></canvas>
                </div>
                <div id="chart-empty-state" class="empty-state">No data to chart yet.</div>
            </div>

            <h3 class="section-title">Ledger History</h3>
            <div class="history-wrapper">
                <ul id="history" class="history-list">
                </ul>
            </div>
        </main>

        <nav class="glass-nav">
            <button class="nav-btn active" id="nav-calc" onclick="switchTab('calc')">
                <div class="nav-text">Register</div>
            </button>
            <button class="nav-btn" id="nav-finance" onclick="switchTab('finance')">
                <div class="nav-text">Analytics</div>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
